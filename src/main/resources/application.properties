spring.application.name=subastar

# Base de datos
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=subastar_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:SubastAR123!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false
# Usar nombres de columna exactamente como se definen en @Column(name=...) / @Table(name=...)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Puerto
server.port=8080
server.servlet.context-path=/api/v1

# JWT
jwt.secret=${JWT_SECRET:subastar-jwt-secret-key-for-signing-must-be-at-least-256-bits-long-tpo-2024}
jwt.expiration=86400000

# Frontend Expo web. Override with a comma-separated list in deployed environments.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081}

# Multipart (para fotos/archivos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# Mail (Gmail SMTP)
