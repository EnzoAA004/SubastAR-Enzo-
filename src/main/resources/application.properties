spring.application.name=subastar

# Base de datos
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=subastar_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=SubastAR123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false
# Usar nombres de columna exactamente como se definen en @Column(name=...) / @Table(name=...)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto
server.port=8080
server.servlet.context-path=/api/v1

# JWT
jwt.secret=subastar-jwt-secret-key-for-signing-must-be-at-least-256-bits-long-tpo-2024
jwt.expiration=86400000

# Multipart (para fotos/archivos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
